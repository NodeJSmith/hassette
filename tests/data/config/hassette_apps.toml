[hassette]
base_url = "http://127.0.0.1:8123"

[hassette.apps]
directory = "tests/data/apps"
autodetect = false

[hassette.apps.my_app]
enabled = true
filename = "my_app.py"
class_name = "MyApp"
display_name = "My Test App"
app_dir = "tests/data/apps"
config = { test_entity = "input_button.test", instance_name = "unique_instance_name" }

[hassette.apps.my_app_sync]
enabled = true
filename = "my_app_sync.py"
class_name = "MyAppSync"
display_name = "My Test App Sync"
app_dir = "tests/data/apps"
# instance_name left off for testing default behavior
config = { test_entity = "input_button.test" }

[hassette.apps.disabled_app]
enabled = false
filename = "disabled_app.py"
class_name = "DisabledApp"
display_name = "Disabled App"
app_dir = "tests/data/apps"
config = { test_entity = "input_button.test", instance_name = "disabled_instance" }

[hassette.apps.no_autostart_app]
enabled = true
autostart = false
filename = "no_autostart_app.py"
class_name = "NoAutostartApp"
display_name = "No Autostart App"
app_dir = "tests/data/apps"
config = { test_entity = "input_button.test", instance_name = "no_autostart_instance" }

[hassette.apps.non_existent_app]
enabled = false
filename = "non_existent_file.py"
class_name = "MissingClass"
