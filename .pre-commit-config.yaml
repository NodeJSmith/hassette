repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-shebang-scripts-are-executable
      - id: debug-statements

  - repo: local
    hooks:
      - id: zizmor
        name: zizmor (GitHub Actions security)
        language: system
        entry: env -u GH_TOKEN -u GITHUB_TOKEN uvx zizmor@1.26.1 --offline
        files: ^\.github/workflows/
        stages: [pre-commit, pre-push]

  - repo: https://github.com/crate-ci/typos
    rev: v1.46.3
    hooks:
      - id: typos
        args: [--force-exclude]
        stages: [pre-commit, pre-push]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: "v0.14.9"
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [--fix]
        exclude: ^docs/.*\.(py|rst)$ # Exclude docs/ directory for linting.
      # Run the formatter.
      - id: ruff-format
        exclude: ^docs/.*\.(py|rst)$ # Exclude docs/ directory for formatting.

  - repo: https://github.com/python-trio/flake8-async
    rev: "26.4.2"
    hooks:
      - id: flake8-async
        args: ["--enable=ASYNC103,ASYNC104"]

  - repo: local
    hooks:
      - id: prettier
        name: prettier (frontend)
        language: system
        entry: npx --prefix frontend prettier --write
        types_or: [ts, tsx, css]
        files: ^frontend/src/
        exclude: (generated-types\.ts|\.module\.css\.d\.ts)$

      - id: eslint
        name: eslint (frontend)
        language: system
        entry: npx --prefix frontend eslint
        types_or: [ts, tsx]
        files: ^frontend/src/

      - id: tsc
        name: tsc (frontend)
        language: system
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        types_or: [ts, tsx]
        files: ^frontend/src/
        pass_filenames: false

      - id: check-css-refs
        name: Check undefined CSS refs in TSX
        language: system
        entry: uv run python tools/frontend/check_undefined_css_refs.py
        types_or: [ts, tsx, css]
        files: ^frontend/src/
        pass_filenames: false

      # regenerate sync.py
      # language: system + uv run so the hook uses the same PEP 723 script metadata
      # path as local development — otherwise any future generator dependency added
      # to the `# /// script` block would install locally but silently not install
      # under the hook's implicit `python` environment.
      - id: generate_sync_facade
        name: Generate sync.py facade
        language: system
        entry: uv run python codegen/src/hassette_codegen/sync_facade/ --target api
        pass_filenames: false
        files: (src/hassette/api/api\.py|codegen/src/hassette_codegen/sync_facade/)
        stages:
          - pre-push

      # regenerate RecordingSyncFacade in sync_facade.py
      - id: generate_recording_sync_facade
        name: Generate RecordingSyncFacade
        language: system
        entry: uv run python codegen/src/hassette_codegen/sync_facade/ --target recording
        pass_filenames: false
        files: (src/hassette/test_utils/recording_api\.py|src/hassette/api/api\.py|codegen/src/hassette_codegen/sync_facade/)
        stages:
          - pre-push

      # regenerate BusSyncFacade in bus/sync.py
      - id: generate_bus_sync_facade
        name: Generate BusSyncFacade
        language: system
        entry: uv run python codegen/src/hassette_codegen/sync_facade/ --target bus
        pass_filenames: false
        files: (src/hassette/bus/bus\.py|src/hassette/bus/options\.py|codegen/src/hassette_codegen/sync_facade/)
        stages:
          - pre-push

      # regenerate SchedulerSyncFacade in scheduler/sync.py
      - id: generate_scheduler_sync_facade
        name: Generate SchedulerSyncFacade
        language: system
        entry: uv run python codegen/src/hassette_codegen/sync_facade/ --target scheduler
        pass_filenames: false
        files: (src/hassette/scheduler/scheduler\.py|codegen/src/hassette_codegen/sync_facade/)
        stages:
          - pre-push

      # ban mypy-style type: ignore comments — use pyright: ignore[reportXxx] instead
      - id: no-mypy-ignore
        name: 'Ban "type: ignore" comments (use pyright)'
        language: pygrep
        types: [python]
        entry: '# type: ignore'

      # ban `from __future__ import annotations` — stringizes annotations at runtime,
      # breaking Pydantic models, FastAPI deps, and typing.get_type_hints()
      - id: no-future-annotations
        name: "Ban from __future__ import annotations (breaks Pydantic)"
        language: pygrep
        types: [python]
        # anchored to line start: a real import is at column 0, so this skips
        # docstrings/comments that merely mention the statement
        entry: '^from __future__ import annotations'

      # ensure codecov yaml is valid
      - id: check-codecov-yml
        name: Check codecov.yml validity
        language: system
        entry: curl --connect-timeout 10 --max-time 60 --fail --data-binary @./.github/codecov.yml https://codecov.io/validate
        types: [yaml]
        files: ^\.github/codecov\.yml$
        pass_filenames: false

      - id: check-schemas-fresh
        name: Check schemas are up to date
        language: system
        entry: tools/check_schemas_fresh.py
        pass_filenames: false
        files: ^src/hassette/(web/|config/)
        stages:
          - pre-push

      - id: check-missing-attribute
        name: Check for missing 'attributes' in State classes
        language: system
        entry: ./tools/check_for_missing_attribute.py
        pass_filenames: false
        stages:
          - pre-push

      - id: check-lazy-imports
        name: Ban lazy imports (use '# lazy-import:' to defend circular-import cases)
        language: system
        entry: ./tools/check_lazy_imports.py
        files: ^(src|tests|scripts|tools|codegen|docs|examples)/.*\.py$
        stages: [pre-commit, pre-push]

      - id: check-spec-tokens
        name: Ban leaked spec-artifact tokens (AC#/FR#/T##/WP#)
        language: system
        entry: ./tools/check_spec_tokens.py
        files: ^(src|tests|scripts|tools|codegen|docs|examples)/.*\.py$
        stages: [pre-commit, pre-push]

      - id: check-llm-cruft
        name: Ban AI-writing tells (section dividers, filler phrases)
        language: system
        entry: ./tools/check_llm_cruft.py
        files: ^(src|tests|scripts|tools|codegen|docs|examples)/.*\.py$
        stages: [pre-commit, pre-push]

      - id: check-module-boundaries
        name: Enforce import boundaries (test_utils isolation) in src
        language: system
        entry: ./tools/check_module_boundaries.py
        files: ^src/.*\.py$
        stages: [pre-commit, pre-push]

      - id: check-test-factories
        name: Check test factory shadowing
        language: system
        entry: ./tools/check_test_factories.py
        files: ^tests/.*\.py$
        stages: [pre-commit, pre-push]

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.408
    hooks:
      - id: pyright
        stages: [pre-push]
        exclude: ^(docs|scripts)/.*\.(py|rst)$ # Exclude docs/ and scripts/ directories for type checking.
