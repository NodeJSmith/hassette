name: Release Please

on:
    push:
        branches: [main]
    workflow_dispatch:
        inputs:
            tag_name:
                description: "Release tag to publish (e.g. v0.38.0). Skips release-please and publishes directly."
                required: true
                type: string

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: release-please
    cancel-in-progress: false

jobs:
    release-please:
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        timeout-minutes: 15
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
            pr: ${{ steps.release.outputs.pr }}
        steps:
            - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
              id: app-token
              with:
                  app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
                  private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

            - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
              id: release
              with:
                  token: ${{ steps.app-token.outputs.token }}
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json

    # Runs only on push when release-please opens/updates a PR (not on release or workflow_dispatch)
    sync-lockfile:
        needs: release-please
        if: needs.release-please.outputs.pr && needs.release-please.outputs.release_created != 'true'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
              id: app-token
              with:
                  app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
                  private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
                  token: ${{ steps.app-token.outputs.token }}
                  persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
              with:
                  enable-cache: true

            - name: Sync uv.lock
              env:
                  APP_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  set -euo pipefail
                  uv lock
                  if git diff --quiet uv.lock; then
                      echo "uv.lock is already up to date"
                  else
                      git config user.name "github-actions[bot]"
                      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                      git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                      git add uv.lock
                      git commit -m "chore: sync uv.lock with version bump"
                      git push origin HEAD
                  fi

    build-pypi:
        needs: release-please
        if: >-
            always()
            && (
              (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true')
              || github.event_name == 'workflow_dispatch'
            )
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  ref: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}
                  persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
              with:
                  activate-environment: true
                  enable-cache: true

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: "22"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Set up Python
              run: uv python install

            - name: Install Python packages
              run: uv sync

            - name: Build frontend SPA
              run: uv run nox -s frontend

            - name: Verify tag matches project version
              env:
                  TAG_NAME: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}
              run: |
                  PROJECT_VERSION=$(uv version --short)
                  uv run ./tools/release/check_tag_version.py --ref-name "$TAG_NAME" --project-version "$PROJECT_VERSION"

            - name: Build a binary wheel and a source tarball
              run: uv build

            - name: Verify SPA assets in wheel
              run: uv run ./tools/release/check_wheel_spa.py

            - name: Publish build artifacts
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: pypi-dists
                  path: "./dist"

    publish-pypi:
        needs: [release-please, build-pypi]
        if: >-
            always()
            && needs.build-pypi.result == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        environment:
            name: release
            url: https://pypi.org/p/hassette
        permissions:
            id-token: write
        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: pypi-dists
                  path: "./dist"

            - name: Publish to PyPI (attempt 1)
              id: attempt1
              continue-on-error: true
              uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
              with:
                  skip-existing: true

            - name: Wait 30s before retry
              if: steps.attempt1.outcome == 'failure'
              run: echo "::warning::Publish attempt 1 failed (likely transient Sigstore/network error), retrying..." && sleep 30

            - name: Publish to PyPI (attempt 2)
              id: attempt2
              if: steps.attempt1.outcome == 'failure'
              continue-on-error: true
              uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
              with:
                  skip-existing: true

            - name: Wait 60s before retry
              if: steps.attempt2.outcome == 'failure'
              run: echo "::warning::Publish attempt 2 failed, final retry..." && sleep 60

            # No continue-on-error: job fails hard if all three attempts fail
            - name: Publish to PyPI (attempt 3)
              id: attempt3
              if: steps.attempt2.outcome == 'failure'
              uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
              with:
                  skip-existing: true

    publish-docker:
        needs: [release-please, build-pypi]
        if: >-
            always()
            && needs.build-pypi.result == 'success'
        uses: ./.github/workflows/build_and_publish_image.yml
        with:
            tag_name: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}
        permissions:
            contents: read
            packages: write
            id-token: write

    # Verify even when build-pypi is skipped in a release context — a skipped build
    # during a release is itself the bug (see #998), and verification must catch it.
    release-verify:
        needs: [release-please, build-pypi, publish-pypi, publish-docker]
        if: >-
            always()
            && (
              needs.build-pypi.result != 'skipped'
              || github.event_name == 'workflow_dispatch'
              || (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true')
            )
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Check publish results
              env:
                  BUILD_RESULT: ${{ needs.build-pypi.result }}
                  PYPI_RESULT: ${{ needs.publish-pypi.result }}
                  DOCKER_RESULT: ${{ needs.publish-docker.result }}
                  TAG_NAME: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}
              run: |
                  # Detect unexpected state where release was created but both publish jobs were skipped
                  if [ "$PYPI_RESULT" = "skipped" ] && [ "$DOCKER_RESULT" = "skipped" ]; then
                      echo "::error::Both publish jobs were skipped unexpectedly for release $TAG_NAME — inspect the publish workflow conditions and logs"
                      exit 1
                  fi

                  failed=""
                  if [ "$BUILD_RESULT" != "success" ]; then
                      failed="$failed Build($BUILD_RESULT)"
                  fi
                  if [ "$PYPI_RESULT" != "success" ]; then
                      failed="$failed PyPI($PYPI_RESULT)"
                  fi
                  if [ "$DOCKER_RESULT" != "success" ]; then
                      failed="$failed Docker($DOCKER_RESULT)"
                  fi
                  if [ -n "$failed" ]; then
                      echo "::error::Partial release $TAG_NAME — failed:$failed"
                      echo "::notice::Recovery: re-run failed jobs, or trigger workflow_dispatch with tag_name=$TAG_NAME"
                      exit 1
                  fi
                  echo "All publish jobs succeeded for $TAG_NAME"

            - name: Verify package on PyPI
              if: needs.publish-pypi.result == 'success'
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  ref: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}
                  sparse-checkout: tools/release/check_pypi_wheel.py
                  persist-credentials: false

            - name: Run PyPI smoke test
              if: needs.publish-pypi.result == 'success'
              env:
                  TAG_NAME: ${{ needs.release-please.outputs.tag_name || inputs.tag_name }}
              run: python3 ./tools/release/check_pypi_wheel.py --version "${TAG_NAME#v}"
