name: E2E Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            code: ${{ steps.filter.outputs.code }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      code:
                        - 'src/**'
                        - 'tests/e2e/**'
                        - 'frontend/**'
                        - 'pyproject.toml'
                        - 'uv.lock'
                        - 'noxfile.py'
                        - '.github/workflows/e2e-tests.yml'

    e2e:
        needs: changes
        if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 10

        env:
            TZ: America/Chicago

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@v6
              with:
                  python-version: "3.13"

            - run: uv sync

            - name: Run e2e tests
              run: uv run nox -s e2e

            - name: Upload test results
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-test-results
                  path: test-results/
                  retention-days: 7

    e2e-complete:
        needs: [e2e]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Report result
              run: |
                  failed="${{ contains(needs.*.result, 'failure') }}"
                  cancelled="${{ contains(needs.*.result, 'cancelled') }}"
                  if [[ "$failed" == "true" || "$cancelled" == "true" ]]; then
                      echo "E2E tests failed or were cancelled"
                      exit 1
                  fi
                  echo "E2E tests passed or were skipped (no relevant changes)"
