name: E2E Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            code: ${{ steps.filter.outputs.code }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false
            - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
              id: filter
              with:
                  filters: |
                      code:
                        - 'src/**'
                        - 'tests/e2e/**'
                        - 'frontend/**'
                        - 'pyproject.toml'
                        - 'uv.lock'
                        - 'noxfile.py'
                        - '.github/workflows/e2e-tests.yml'

    e2e:
        needs: changes
        if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 20

        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12", "3.13", "3.14"]

        env:
            TZ: America/Chicago

        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
              with:
                  python-version: ${{ matrix.python-version }}

            - run: uv sync

            - name: Run e2e tests
              run: uv run nox -s e2e -p ${{ matrix.python-version }}

            - name: Upload test results
              if: failure()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: e2e-test-results-${{ matrix.python-version }}
                  path: test-results/
                  retention-days: 7

    e2e-complete:
        needs: [e2e]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Report result
              run: |
                  failed="${{ contains(needs.*.result, 'failure') }}"
                  cancelled="${{ contains(needs.*.result, 'cancelled') }}"
                  if [[ "$failed" == "true" || "$cancelled" == "true" ]]; then
                      echo "E2E tests failed or were cancelled"
                      exit 1
                  fi
                  echo "E2E tests passed or were skipped (no relevant changes)"
