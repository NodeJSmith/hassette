name: E2E Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            code: ${{ steps.filter.outputs.code }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false
            - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
              id: filter
              with:
                  filters: |
                      code:
                        - 'src/**'
                        - 'tests/e2e/**'
                        - 'frontend/**'
                        - 'pyproject.toml'
                        - 'uv.lock'
                        - 'noxfile.py'
                        - '.github/workflows/e2e-tests.yml'

    e2e:
        needs: changes
        if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 10

        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.13", "3.14"]

        env:
            TZ: America/Chicago

        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
              with:
                  python-version: ${{ matrix.python-version }}

            - run: uv sync

            - name: Run e2e tests
              run: uv run nox -s e2e -p ${{ matrix.python-version }}

            - name: Upload test results
              if: failure()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: e2e-test-results
                  path: test-results/
                  retention-days: 7

    e2e-complete:
        needs: [e2e]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Report result
              run: |
                  failed="${{ contains(needs.*.result, 'failure') }}"
                  cancelled="${{ contains(needs.*.result, 'cancelled') }}"
                  if [[ "$failed" == "true" || "$cancelled" == "true" ]]; then
                      echo "E2E tests failed or were cancelled"
                      exit 1
                  fi
                  echo "E2E tests passed or were skipped (no relevant changes)"
