name: Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            code: ${{ steps.filter.outputs.code }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      code:
                        - 'src/**'
                        - 'tests/**'
                        - 'frontend/**'
                        - 'pyproject.toml'
                        - 'uv.lock'
                        - 'noxfile.py'
                        - 'scripts/**'
                        - '.github/workflows/tests.yml'

    frontend:
        needs: changes
        if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v4

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@v6
              with:
                  python-version: "3.13"

            - run: uv sync

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install frontend dependencies
              run: npm ci
              working-directory: frontend

            - name: Run frontend tests with coverage
              run: npm run test:coverage
              working-directory: frontend

            - name: Upload frontend coverage
              uses: actions/upload-artifact@v4
              with:
                  name: frontend-coverage
                  path: frontend/coverage/lcov.info

            - name: Regenerate schemas
              run: uv run python scripts/export_schemas.py

            - name: Check openapi.json and ws-schema.json are up to date
              run: git diff --exit-code frontend/openapi.json frontend/ws-schema.json

            - name: Check generated-types.ts is up to date
              run: npm run types && git diff --exit-code -- src/api/generated-types.ts
              working-directory: frontend

            - name: Build frontend
              run: npm run build
              working-directory: frontend

    test:
        needs: changes
        if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 10

        env:
            TZ: America/Chicago

        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12", "3.13"]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install fd-find
              run: sudo apt-get update && sudo apt-get install -y fd-find

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@v6
              with:
                  python-version: ${{ matrix.python-version }}

            - run: uv sync

            - name: Run tests with coverage
              run: uv run nox -t coverage -p ${{ matrix.python-version }}

            - name: Upload coverage data
              uses: actions/upload-artifact@v4
              with:
                  name: .coverage.${{ matrix.python-version }}
                  path: .coverage.${{ matrix.python-version }}
                  include-hidden-files: true

    system:
        needs: changes
        if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 10

        env:
            TZ: America/Chicago

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                  python-version: "3.13"

            - run: uv sync

            - name: Run system tests with coverage
              run: uv run nox -s system_with_coverage

            - name: Upload coverage data
              uses: actions/upload-artifact@v4
              with:
                  name: .coverage.system
                  path: .coverage.system
                  include-hidden-files: true

    combine-and-report:
        needs: [frontend, test, system]
        if: |
            always() &&
            !contains(needs.*.result, 'failure') &&
            !contains(needs.*.result, 'cancelled') &&
            (needs.frontend.result == 'success' || needs.test.result == 'success' || needs.system.result == 'success')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@v6
              with:
                  python-version: 3.11

            - name: Install coverage
              run: |
                  uv venv
                  uv pip install -U 'coverage[toml]'

            - uses: actions/download-artifact@v5
              with:
                  path: coverage-parts
                  pattern: .coverage.*
                  merge-multiple: true

            - name: Download frontend coverage
              uses: actions/download-artifact@v5
              with:
                  name: frontend-coverage
                  path: frontend-coverage

            - name: Combine coverage and report
              run: |
                  uv run coverage combine coverage-parts
                  uv run coverage xml -o coverage.xml
                  uv run coverage report

            - name: Upload HTML report (artifact)
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-html
                  path: htmlcov

            - name: Upload XML for integrations
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-xml
                  path: coverage.xml

            - name: Upload coverage to Codecov
              if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
              uses: codecov/codecov-action@v5
              with:
                  files: coverage.xml,frontend-coverage/lcov.info
                  fail_ci_if_error: true
                  verbose: true
                  name: codecov-${{ github.run_id }}
                  token: ${{ secrets.CODECOV_TOKEN }}
                  flags: backend,frontend

    tests-complete:
        needs: [frontend, test, system, combine-and-report]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Report result
              run: |
                  failed="${{ contains(needs.*.result, 'failure') }}"
                  cancelled="${{ contains(needs.*.result, 'cancelled') }}"
                  if [[ "$failed" == "true" || "$cancelled" == "true" ]]; then
                      echo "One or more test jobs failed or were cancelled"
                      exit 1
                  fi
                  echo "All tests passed or were skipped (no relevant changes)"
