name: Tests

on:
    push:
    workflow_dispatch:

jobs:
    frontend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install frontend dependencies
              run: npm ci
              working-directory: frontend

            - name: Run frontend tests
              run: npm test
              working-directory: frontend

            - name: Build frontend
              run: npm run build
              working-directory: frontend

    test:
        runs-on: ubuntu-latest

        env:
            TZ: America/Chicago

        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12", "3.13"]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@v6
              with:
                  python-version: ${{ matrix.python-version }}

            - run: uv sync

            - name: Run tests with coverage
              run: uv run nox -t coverage -p ${{ matrix.python-version }}

            - name: Upload coverage data
              uses: actions/upload-artifact@v4
              with:
                  name: .coverage.${{ matrix.python-version }}
                  path: .coverage.${{ matrix.python-version }}
                  include-hidden-files: true

    smoke:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        env:
            TZ: America/Chicago

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                  python-version: "3.13"

            - run: uv sync

            - name: Run smoke tests with coverage
              run: uv run nox -s smoke_with_coverage

            - name: Upload coverage data
              uses: actions/upload-artifact@v4
              with:
                  name: .coverage.smoke
                  path: .coverage.smoke
                  include-hidden-files: true

    combine-and-report:
        needs: [test, smoke]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@v6
              with:
                  python-version: 3.11

            - name: Install coverage
              run: |
                  uv venv
                  uv pip install -U 'coverage[toml]'

            - uses: actions/download-artifact@v5
              with:
                  path: coverage-parts
                  pattern: .coverage.*
                  merge-multiple: true

            - name: Combine coverage and report
              run: |
                  uv run coverage combine coverage-parts
                  uv run coverage xml -o coverage.xml
                  uv run coverage report

            - name: Upload HTML report (artifact)
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-html
                  path: htmlcov

            - name: Upload XML for integrations
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-xml
                  path: coverage.xml

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v5
              with:
                  files: coverage.xml
                  fail_ci_if_error: true
                  verbose: true
                  name: codecov-${{ github.run_id }}
                  token: ${{ secrets.CODECOV_TOKEN }}
