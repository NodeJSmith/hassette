name: Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            code: ${{ steps.filter.outputs.code }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false
            - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
              id: filter
              with:
                  filters: |
                      code:
                        - 'src/**'
                        - 'tests/**'
                        - 'frontend/**'
                        - 'pyproject.toml'
                        - 'uv.lock'
                        - 'noxfile.py'
                        - 'scripts/**'
                        - '.github/workflows/tests.yml'

    frontend:
        needs: changes
        if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
              with:
                  python-version: "3.13"

            - run: uv sync

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install frontend dependencies
              run: npm ci
              working-directory: frontend

            - name: Run frontend tests with coverage
              run: npm run test:coverage
              working-directory: frontend

            - name: Upload frontend coverage
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: frontend-coverage
                  path: frontend/coverage/lcov.info

            - name: Regenerate schemas
              run: uv run python scripts/export_schemas.py

            - name: Check openapi.json and ws-schema.json are up to date
              run: git diff --exit-code frontend/openapi.json frontend/ws-schema.json

            - name: Check generated-types.ts is up to date
              run: npm run types && git diff --exit-code -- src/api/generated-types.ts
              working-directory: frontend

            - name: Check ws-types.ts is up to date
              run: npm run ws-types && git diff --exit-code -- src/api/ws-types.ts
              working-directory: frontend

            - name: Build frontend
              run: npm run build
              working-directory: frontend

            - name: Check frontend bundle size
              run: npx size-limit
              working-directory: frontend

    test:
        needs: changes
        if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 20

        env:
            TZ: America/Chicago

        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12", "3.13", "3.14"]

        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Install fd-find
              run: sudo apt-get update && sudo apt-get install -y fd-find

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
              with:
                  python-version: ${{ matrix.python-version }}

            - run: uv sync

            # 3.12 skips coverage: sys.settrace overhead adds ~6min to the suite.
            # sysmon (PEP 669) would fix this but can't measure branches until 3.14.
            # Coverage from 3.11/3.13/3.14 is sufficient for the combined report.
            - name: Run tests with coverage
              if: matrix.python-version != '3.12'
              run: uv run nox -t coverage -p ${{ matrix.python-version }}

            - name: Run tests without coverage (3.12)
              if: matrix.python-version == '3.12'
              run: uv run nox -s tests -p ${{ matrix.python-version }}

            - name: Upload coverage data
              if: matrix.python-version != '3.12'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: .coverage.${{ matrix.python-version }}
                  path: .coverage.${{ matrix.python-version }}
                  include-hidden-files: true

    system:
        needs: changes
        if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 20

        env:
            TZ: America/Chicago

        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12", "3.13", "3.14"]

        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
              with:
                  python-version: ${{ matrix.python-version }}

            - run: uv sync

            # Same 3.12 coverage skip as the test job — see comment there.
            - name: Run system tests with coverage
              if: matrix.python-version != '3.12'
              run: uv run nox -s system_with_coverage -p ${{ matrix.python-version }}

            - name: Run system tests without coverage (3.12)
              if: matrix.python-version == '3.12'
              run: uv run nox -s system -p ${{ matrix.python-version }}

            - name: Upload coverage data
              if: matrix.python-version != '3.12'
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: .coverage.system.${{ matrix.python-version }}
                  path: .coverage.system.${{ matrix.python-version }}
                  include-hidden-files: true

    combine-and-report:
        needs: [frontend, test, system]
        if: |
            always() &&
            !contains(needs.*.result, 'failure') &&
            !contains(needs.*.result, 'cancelled') &&
            (needs.frontend.result == 'success' || needs.test.result == 'success' || needs.system.result == 'success')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
              with:
                  python-version: 3.11

            - name: Install coverage
              run: |
                  uv venv
                  uv pip install -U 'coverage[toml]'

            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  path: coverage-parts
                  pattern: .coverage.*
                  merge-multiple: true

            - name: Download frontend coverage
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: frontend-coverage
                  path: frontend-coverage

            - name: Combine coverage and report
              run: |
                  uv run coverage combine coverage-parts
                  uv run coverage xml -o coverage.xml
                  uv run coverage report

            - name: Upload HTML report (artifact)
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: coverage-html
                  path: htmlcov

            - name: Upload XML for integrations
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: coverage-xml
                  path: coverage.xml

            - name: Upload coverage to Codecov
              if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
              continue-on-error: true
              uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
              with:
                  files: coverage.xml,frontend-coverage/lcov.info
                  fail_ci_if_error: true
                  verbose: true
                  name: codecov-${{ github.run_id }}
                  token: ${{ secrets.CODECOV_TOKEN }}
                  flags: backend,frontend

    tests-complete:
        needs: [frontend, test, system, combine-and-report]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Report result
              run: |
                  failed="${{ contains(needs.*.result, 'failure') }}"
                  cancelled="${{ contains(needs.*.result, 'cancelled') }}"
                  if [[ "$failed" == "true" || "$cancelled" == "true" ]]; then
                      echo "One or more test jobs failed or were cancelled"
                      exit 1
                  fi
                  echo "All tests passed or were skipped (no relevant changes)"
