name: Docs

on:
    push:
        paths:
            - "docs/**"
            - "mkdocs.yml"
            - "pyproject.toml"
            - ".github/workflows/docs.yml"
    pull_request:
        paths:
            - "docs/**"
            - "mkdocs.yml"
            - "pyproject.toml"
            - ".github/workflows/docs.yml"

permissions:
    contents: read
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                persist-credentials: false

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: uv sync

            - name: Build docs (strict)
              run: uv run mkdocs build --strict

    docs-check:
        # Catches API reference drift when src/ changes without docs/ changes.
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                persist-credentials: false

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: uv sync

            - name: Type-check snippets
              run: uv run pyright --project docs

            - name: Build docs (strict)
              run: uv run mkdocs build --strict
