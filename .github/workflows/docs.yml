name: Docs

on:
    push:
        paths:
            - "docs/**"
            - "mkdocs.yml"
            - "pyproject.toml"
            - "tools/check_snippet_orphans.py"
            - ".github/workflows/docs.yml"
    pull_request:
        paths:
            - "docs/**"
            - "mkdocs.yml"
            - "pyproject.toml"
            - "tools/check_snippet_orphans.py"
            - ".github/workflows/docs.yml"

    workflow_dispatch:

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                persist-credentials: false

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: uv sync

            - name: Build docs (strict)
              run: uv run mkdocs build --strict

            - name: Check snippet orphans
              continue-on-error: true # TODO: remove after Phase 3 writing cleans up pre-existing orphans
              run: uv run python tools/check_snippet_orphans.py

            - name: Upload site artifact
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: docs-site
                  path: site/
                  retention-days: 1

    link-check:
        needs: build
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Download site artifact
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
              with:
                  name: docs-site
                  path: site/

            - name: Set up Go
              uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
              with:
                  go-version: "stable"
                  cache: false

            - name: Install muffet
              run: |
                  go install github.com/raviqqe/muffet/v2@v2.11.4
                  echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

            - name: Serve site
              run: python3 -m http.server 8000 -d site &

            - name: Wait for server
              run: timeout 10 bash -c 'until curl -s http://localhost:8000/ > /dev/null; do sleep 0.5; done'

            - name: Run muffet
              run: |
                  muffet http://localhost:8000/ \
                    --include '^http://localhost:8000' \
                    --timeout 30 \
                    --max-connections 10 \
                    --buffer-size 8192

    docs-check:
        # Catches API reference drift when src/ changes without docs/ changes.
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                persist-credentials: false

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: uv sync

            - name: Type-check snippets
              run: uv run pyright --project docs

            - name: Build docs (strict)
              run: uv run mkdocs build --strict
