name: Docs

on:
    push:
        paths:
            - "docs/**"
            - "mkdocs.yml"
            - "pyproject.toml"
            - "tools/docs/check_snippet_orphans.py"
            - ".github/workflows/docs.yml"
    pull_request:
        paths:
            - "docs/**"
            - "mkdocs.yml"
            - "pyproject.toml"
            - "tools/docs/check_snippet_orphans.py"
            - ".github/workflows/docs.yml"

    workflow_dispatch:

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: uv sync

            - name: Build docs (strict)
              run: uv run mkdocs build --strict

            - name: Check snippet orphans
              continue-on-error: true # TODO: remove after Phase 3 writing cleans up pre-existing orphans
              run: uv run python tools/docs/check_snippet_orphans.py

            - name: Upload site artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: docs-site
                  path: site/
                  retention-days: 1

    link-check:
        needs: build
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Download site artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: docs-site
                  path: site/

            - name: Set up Go
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
              with:
                  go-version: "stable"
                  cache: false

            - name: Install muffet
              run: |
                  go install github.com/raviqqe/muffet/v2@v2.11.4
                  echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

            - name: Serve site
              run: python3 -m http.server 8000 -d site &

            - name: Wait for server
              run: timeout 10 bash -c 'until curl -s http://localhost:8000/ > /dev/null; do sleep 0.5; done'

            - name: Run muffet
              run: |
                  muffet http://localhost:8000/ \
                    --include '^http://localhost:8000' \
                    --timeout 30 \
                    --max-connections 10 \
                    --buffer-size 8192

    docs-check:
        # Catches API reference drift when src/ changes without docs/ changes.
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: uv sync

            - name: Type-check snippets
              run: uv run pyright --project docs

            - name: Build docs (strict)
              run: uv run mkdocs build --strict
