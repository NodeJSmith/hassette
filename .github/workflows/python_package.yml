name: Publish Python package

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag (e.g. v0.24.0) — passed by release-please"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish (e.g. v0.24.0)"
        required: true
        type: string

jobs:
  build-pypi-dists:
    name: Build Python package

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install python packages
        run: uv sync

      - name: Verify tag matches project version
        if: inputs.tag_name != ''
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: uv run ./tools/check_tag_version.py --ref-name "$TAG_NAME" --project-version "$(uv version --short)"

      - name: Build a binary wheel and a source tarball
        run: uv build

      - name: Publish build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dists
          path: "./dist"

  publish-pypi-dists:
    name: Publish to PyPI
    environment:
      name: release
      url: https://pypi.org/p/hassette
    needs: [build-pypi-dists]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # IMPORTANT: this permission is mandatory for trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: pypi-dists
          path: "./dist"

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
