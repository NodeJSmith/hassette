name: Publish Python package

on:
    workflow_dispatch:
        inputs:
            tag_name:
                description: "Release tag to publish (e.g. v0.24.0)"
                required: true
                type: string

permissions:
    contents: read

jobs:
    build-pypi-dists:
        name: Build Python package
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  ref: ${{ inputs.tag_name || github.ref }}
                  persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
              with:
                  activate-environment: true
                  enable-cache: true

            - name: Set up Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: "22"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Set up Python
              run: uv python install

            - name: Install python packages
              run: uv sync

            - name: Build frontend SPA
              run: uv run nox -s frontend

            - name: Verify tag matches project version
              if: inputs.tag_name != ''
              env:
                  TAG_NAME: ${{ inputs.tag_name }}
              run: |
                  PROJECT_VERSION=$(uv version --short)
                  uv run ./tools/check_tag_version.py --ref-name "$TAG_NAME" --project-version "$PROJECT_VERSION"

            - name: Build a binary wheel and a source tarball
              run: uv build

            - name: Verify SPA assets in wheel
              run: uv run ./tools/check_wheel_spa.py

            - name: Publish build artifacts
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: pypi-dists
                  path: "./dist"

    publish-pypi-dists:
        name: Publish to PyPI
        environment:
            name: release
            url: https://pypi.org/p/hassette
        needs: [build-pypi-dists]
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            id-token: write # IMPORTANT: this permission is mandatory for trusted publishing

        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
              with:
                  name: pypi-dists
                  path: "./dist"

            - name: Publish distribution to PyPI
              uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
              with:
                  skip-existing: true
