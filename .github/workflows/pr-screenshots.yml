name: PR Screenshots

# Dedicated workflow (not a lint.yml job) so it can re-evaluate when the PR body
# or labels change without re-running the whole lint suite on every edit.
on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened, edited, labeled, unlabeled]

concurrency:
    group: pr-screenshots-${{ github.event.pull_request.number }}
    cancel-in-progress: true

permissions:
    # Needed by actions/checkout.
    contents: read
    # Needed for `gh pr view` in tools/frontend/check_pr_screenshots.py.
    pull-requests: read

jobs:
    screenshots:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Require visual evidence on UI-changing PRs
              run: python3 tools/frontend/check_pr_screenshots.py --pr "${PR_NUMBER}"
              env:
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  GH_TOKEN: ${{ github.token }}
