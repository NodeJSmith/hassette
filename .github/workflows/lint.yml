name: Lint

on:
    push:
    workflow_dispatch:

jobs:
    python:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@v6
              with:
                  python-version: "3.13"

            - run: uv sync

            - name: Install fd-find
              run: sudo apt-get update && sudo apt-get install -y fd-find

            - name: Run lint checks
              run: |
                  uv tool install ruff==0.14.9
                  uvx ruff format --check --diff .
                  uvx ruff check .
                  SKIP=eslint uvx pre-commit run --all-files --hook-stage pre-push

            - name: Fail if generators produced drift
              # Uses the generator's --check mode, which runs ruff on both the committed
              # file and the freshly generated content inside the same invocation. This
              # makes the comparison ruff-version-agnostic — the same ruff binary
              # normalizes both sides. A plain `git diff` approach would depend on the
              # pre-commit hook and `uv tool install ruff==X` staying in lockstep.
              run: |
                  if ! uv run tools/generate_sync_facade.py --target both --check; then
                    echo ""
                    echo "ERROR: generated files are out of date. Re-run locally and commit:"
                    echo "  uv run tools/generate_sync_facade.py --target both"
                    echo ""
                    exit 1
                  fi

    frontend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install frontend dependencies
              run: npm ci
              working-directory: frontend

            - name: Lint frontend
              run: npm run lint
              working-directory: frontend

            - name: Type check frontend
              run: npx tsc --noEmit
              working-directory: frontend
