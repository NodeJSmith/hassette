name: Lint

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            python: ${{ steps.filter.outputs.python }}
            frontend: ${{ steps.filter.outputs.frontend }}
            docs: ${{ steps.filter.outputs.docs }}
            codegen: ${{ steps.filter.outputs.codegen }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                persist-credentials: false
            - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
              id: filter
              with:
                  filters: |
                      python:
                        - 'src/**'
                        - 'tests/**'
                        - 'examples/**'
                        - 'pyproject.toml'
                        - 'pyrightconfig.json'
                        - 'uv.lock'
                        - 'ruff.toml'
                        - '_typos.toml'
                        - '.pre-commit-config.yaml'
                        - 'mise.toml'
                        - 'tools/**'
                        - '.github/workflows/lint.yml'
                      frontend:
                        - 'frontend/**'
                        - 'tools/**'
                        - '.github/workflows/lint.yml'
                      docs:
                        - '**/*.md'
                        - 'docs/**'
                        - 'lychee.toml'
                        - '.github/workflows/lint.yml'
                      codegen:
                        - 'src/hassette/models/**'
                        - 'src/hassette/const/**'
                        - 'codegen/**'
                        - '.generated-manifest'

    python:
        needs: changes
        if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                persist-credentials: false

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
              with:
                  python-version: "3.13"

            - run: uv sync

            - name: Install prek
              uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2
              with:
                  install-only: true

            - name: Cache prek environments
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
              with:
                  path: ~/.cache/prek
                  key: prek-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

            - name: Run lint checks
              run: |
                  uv tool install ruff==0.14.9
                  SKIP=eslint,tsc,prettier prek run --all-files --hook-stage pre-push

            - name: Fail if generators produced drift
              # Uses the generator's --check mode, which runs ruff on both the committed
              # file and the freshly generated content inside the same invocation. This
              # makes the comparison ruff-version-agnostic — the same ruff binary
              # normalizes both sides. A plain `git diff` approach would depend on the
              # pre-commit hook and `uv tool install ruff==X` staying in lockstep.
              run: |
                  if ! uv run python codegen/src/hassette_codegen/sync_facade/ --target all --check; then
                    echo ""
                    echo "ERROR: generated files are out of date. Re-run locally and commit:"
                    echo "  uv run python codegen/src/hassette_codegen/sync_facade/ --target all"
                    echo ""
                    exit 1
                  fi

    frontend:
        needs: changes
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                persist-credentials: false

            - name: Set up Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: "22"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install uv
              uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

            - name: Install frontend dependencies
              run: npm ci
              working-directory: frontend

            - name: Check formatting
              run: npm run format:check
              working-directory: frontend

            - name: Lint frontend
              run: npm run lint
              working-directory: frontend

            - name: Build frontend (generates CSS module .d.ts files)
              run: npm run build
              working-directory: frontend

            - name: Type check frontend
              run: npx tsc --noEmit
              working-directory: frontend

            - name: Check CSS module :global() correctness
              run: uv run python tools/frontend/check_css_module_globals.py

            - name: Smoke test CSS allowlist logic
              run: uv run python tools/frontend/check_global_css_allowlist.py --smoke-test

            - name: Check global CSS allowlist (full file)
              run: uv run python tools/frontend/check_global_css_allowlist.py

            - name: Check dead global CSS (blocking)
              run: uv run python tools/frontend/check_dead_global_css.py

            - name: Check undefined CSS refs in TSX (blocking)
              run: uv run python tools/frontend/check_undefined_css_refs.py

            - name: Check breakpoint drift (JS constants vs CSS media queries)
              run: uv run python tools/check_breakpoint_drift.py

    codegen-freshness:
        needs: changes
        if: needs.changes.outputs.codegen == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                persist-credentials: false

            - name: Set up Python 3.14
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
              with:
                  python-version: "3.14"

            - name: Install uv
              uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

            - name: Cache HA core checkout
              id: cache-ha
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
              with:
                  path: ha-core
                  key: ha-core-${{ hashFiles('codegen/ha-version.txt') }}

            - name: Clone HA core
              if: steps.cache-ha.outputs.cache-hit != 'true'
              run: git clone --depth 1 --branch $(cat codegen/ha-version.txt) https://github.com/home-assistant/core.git ha-core

            - name: Install codegen deps
              run: cd codegen && uv sync

            - name: Run codegen unit tests
              run: cd codegen && uv run pytest tests/ -q --rootdir=.
              env:
                  HA_CORE_PATH: ${{ github.workspace }}/ha-core

            - name: Check entity codegen freshness
              run: cd codegen && uv run hassette-codegen generate --ha-core-path ../ha-core --check

            - name: Check HA version staleness
              continue-on-error: true
              run: |
                  PINNED=$(cat codegen/ha-version.txt)
                  LATEST=$(gh api repos/home-assistant/core/releases/latest --jq .tag_name 2>/dev/null || echo "")
                  if [ -n "$LATEST" ] && [ "$PINNED" != "$LATEST" ]; then
                      echo "::warning::Pinned HA version ($PINNED) is behind latest ($LATEST)"
                  fi
              env:
                  GH_TOKEN: ${{ github.token }}

    security:
        needs: changes
        if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
              with:
                  python-version: "3.13"

            - name: Export requirements and audit
              run: |
                  uv export --frozen --no-hashes --no-emit-project --no-group dev --no-group test --no-group docs > requirements.txt
                  uvx pip-audit@2.10.0 -r requirements.txt \
                    --ignore-vuln CVE-2025-69872  # diskcache — no fix available yet (#861)

    slotscheck:
        needs: changes
        if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: uv sync

            - name: Run slotscheck
              run: uv run slotscheck -m hassette

    link-check:
        needs: changes
        if: needs.changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                persist-credentials: false

            - name: Check links
              uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
              with:
                  args: "README.md CONTRIBUTING.md 'docs/**/*.md' --config lychee.toml"
                  fail: true

    lint-complete:
        needs: [python, frontend, codegen-freshness, security, slotscheck, link-check]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Report result
              run: |
                  failed="${{ contains(needs.*.result, 'failure') }}"
                  cancelled="${{ contains(needs.*.result, 'cancelled') }}"
                  if [[ "$failed" == "true" || "$cancelled" == "true" ]]; then
                      echo "One or more lint jobs failed or were cancelled"
                      exit 1
                  fi
                  echo "All lint checks passed or were skipped (no relevant changes)"
