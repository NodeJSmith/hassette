name: Lint

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    changes:
        runs-on: ubuntu-latest
        outputs:
            python: ${{ steps.filter.outputs.python }}
            frontend: ${{ steps.filter.outputs.frontend }}
            docs: ${{ steps.filter.outputs.docs }}
            codegen: ${{ steps.filter.outputs.codegen }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false
            - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
              id: filter
              with:
                  filters: |
                      python:
                        - 'src/**'
                        - 'tests/**'
                        - 'examples/**'
                        - 'codegen/**'
                        - 'docs/**'
                        - 'scripts/**'
                        - 'pyproject.toml'
                        - 'pyrightconfig.json'
                        - 'uv.lock'
                        - 'ruff.toml'
                        - '_typos.toml'
                        - '.pre-commit-config.yaml'
                        - 'mise.toml'
                        - 'tools/**'
                        - '.github/workflows/lint.yml'
                      frontend:
                        - 'frontend/**'
                        - 'tools/**'
                        - '.github/workflows/lint.yml'
                      docs:
                        - '**/*.md'
                        - 'docs/**'
                        - 'lychee.toml'
                        - '.github/workflows/lint.yml'
                      codegen:
                        - 'src/hassette/models/**'
                        - 'src/hassette/const/**'
                        - 'codegen/**'
                        - '.generated-manifest'

    python:
        needs: changes
        if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Install uv and set the Python version
              uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
              with:
                  python-version: "3.13"

            - run: uv sync

            - name: Install prek
              uses: j178/prek-action@8a0e9d7b7d92cbc0139d6b1d1130aa3855ca9172 # v2
              with:
                  install-only: true

            - name: Cache prek environments
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
              with:
                  path: ~/.cache/prek
                  key: prek-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

            - name: Run lint checks
              run: |
                  uv tool install ruff==0.14.9
                  SKIP=eslint,tsc,prettier prek run --all-files --hook-stage pre-push

            - name: Fail if generators produced drift
              # Uses the generator's --check mode, which runs ruff on both the committed
              # file and the freshly generated content inside the same invocation. This
              # makes the comparison ruff-version-agnostic — the same ruff binary
              # normalizes both sides. A plain `git diff` approach would depend on the
              # pre-commit hook and `uv tool install ruff==X` staying in lockstep.
              run: |
                  if ! uv run python codegen/src/hassette_codegen/sync_facade/ --target all --check; then
                    echo ""
                    echo "ERROR: generated files are out of date. Re-run locally and commit:"
                    echo "  uv run python codegen/src/hassette_codegen/sync_facade/ --target all"
                    echo ""
                    exit 1
                  fi

            - name: Check coordinator-internal annotations in core tests
              run: uv run python tools/check_coordinator_internal.py

            - name: Check file sizes (non-blocking)
              continue-on-error: true
              run: uv run python tools/check_file_size.py

    frontend:
        needs: changes
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install uv
              uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

            - name: Install frontend dependencies
              run: npm ci
              working-directory: frontend

            - name: Check formatting
              run: npm run format:check
              working-directory: frontend

            - name: Lint frontend
              run: npm run lint
              working-directory: frontend

            - name: Build frontend (generates CSS module .d.ts files)
              run: npm run build
              working-directory: frontend

            - name: Type check frontend
              run: npx tsc --noEmit
              working-directory: frontend

            - name: Check CSS module :global() correctness
              run: uv run python tools/frontend/check_css_module_globals.py

            - name: Smoke test CSS allowlist logic
              run: uv run python tools/frontend/check_global_css_allowlist.py --smoke-test

            - name: Check global CSS allowlist (full file)
              run: uv run python tools/frontend/check_global_css_allowlist.py

            - name: Check dead global CSS (blocking)
              run: uv run python tools/frontend/check_dead_global_css.py

            - name: Check for dead CSS tokens
              run: uv run python tools/frontend/check_dead_tokens.py

            - name: Check undefined CSS refs in TSX (blocking)
              run: uv run python tools/frontend/check_undefined_css_refs.py

            - name: Check breakpoint drift (JS constants vs CSS media queries)
              run: uv run python tools/frontend/check_breakpoint_drift.py

    codegen-freshness:
        needs: changes
        if: needs.changes.outputs.codegen == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Set up Python 3.14
              uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
              with:
                  python-version: "3.14"

            - name: Install uv
              uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

            - name: Cache HA core checkout
              id: cache-ha
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
              with:
                  path: ha-core
                  key: ha-core-${{ hashFiles('codegen/ha-version.txt') }}

            - name: Clone HA core
              if: steps.cache-ha.outputs.cache-hit != 'true'
              run: git clone --depth 1 --branch $(cat codegen/ha-version.txt) https://github.com/home-assistant/core.git ha-core

            - name: Install codegen deps
              run: cd codegen && uv sync

            - name: Run codegen unit tests
              run: cd codegen && uv run pytest tests/ -q --rootdir=.
              env:
                  HA_CORE_PATH: ${{ github.workspace }}/ha-core

            - name: Check entity codegen freshness
              run: cd codegen && uv run hassette-codegen generate --ha-core-path ../ha-core --check

    # Intentionally ungated — runs on every PR so HA version drift is always
    # visible, not just when codegen files change. See also ha-version-drift.yml
    # (daily cron that files a tracking issue when behind).
    ha-version-staleness:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false
                sparse-checkout: codegen/ha-version.txt

            - name: Check HA version staleness
              run: |
                  set -euo pipefail
                  PINNED=$(cat codegen/ha-version.txt)
                  LATEST=$(gh api repos/home-assistant/core/releases/latest --jq .tag_name 2>/dev/null || echo "")
                  if [ -z "$LATEST" ]; then
                      echo "::warning::Could not fetch latest HA release, skipping"
                      exit 0
                  fi
                  if [ "$PINNED" != "$LATEST" ]; then
                      echo "::warning::Pinned HA version ($PINNED) is behind latest ($LATEST). Run codegen bump when ready."
                  else
                      echo "Pinned HA version ($PINNED) matches latest release"
                  fi
              env:
                  GH_TOKEN: ${{ github.token }}

    security:
        needs: changes
        if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
              with:
                  python-version: "3.13"

            - name: Export requirements and audit
              run: |
                  uv export --frozen --no-hashes --no-emit-project --no-group dev --no-group test --no-group docs > requirements.txt
                  uvx pip-audit@2.10.0 -r requirements.txt \
                    --ignore-vuln CVE-2025-69872  # diskcache — no fix available yet (#861)

    lockfile-fresh:
        needs: changes
        if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
              with:
                  python-version: "3.13"

            # uv.lock pins the project's own version, so a pyproject version bump leaves it
            # stale until re-locked. CI installs with a plain `uv sync`, which silently re-resolves
            # and hides the drift — this gate makes a stale lock a loud, fixable red check instead.
            - name: Verify uv.lock is in sync with pyproject.toml
              run: |
                  if ! uv lock --check; then
                      echo "::error::uv.lock is out of sync with pyproject.toml — run 'uv lock' and commit the result"
                      exit 1
                  fi

    slotscheck:
        needs: changes
        if: needs.changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: uv sync

            - name: Run slotscheck
              run: uv run slotscheck -m hassette

    link-check:
        needs: changes
        if: needs.changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                persist-credentials: false

            - name: Check links
              uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
              with:
                  args: "README.md CONTRIBUTING.md 'docs/**/*.md' --config lychee.toml"
                  fail: true

    lint-complete:
        needs: [python, frontend, codegen-freshness, ha-version-staleness, security, lockfile-fresh, slotscheck, link-check]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Report result
              run: |
                  failed="${{ contains(needs.*.result, 'failure') }}"
                  cancelled="${{ contains(needs.*.result, 'cancelled') }}"
                  if [[ "$failed" == "true" || "$cancelled" == "true" ]]; then
                      echo "One or more lint jobs failed or were cancelled"
                      exit 1
                  fi
                  echo "All lint checks passed or were skipped (no relevant changes)"
