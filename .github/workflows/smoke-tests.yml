name: Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "src/hassette/core/core.py"
      - "src/hassette/core/command_executor.py"
      - "src/hassette/core/websocket_service.py"
      - "src/hassette/core/database_service.py"
      - "src/hassette/core/bus_service.py"
      - "tests/smoke/**"
      - "tests/fixtures/ha-config/**"
      - ".github/workflows/smoke-tests.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.13"

      - run: uv sync

      - name: Run smoke tests
        run: uv run nox -s smoke
