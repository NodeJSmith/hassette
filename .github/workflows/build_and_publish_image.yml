name: Build & Publish Image

on:
    pull_request:
        branches: [main] # publish pr-N tagged image for PR testing
    push:
        branches: [main] # publish main tagged image for bleeding-edge testing
    workflow_call: # called by release-please workflow
        inputs:
            tag_name:
                description: "Release tag (e.g. v0.24.0) — passed by release-please"
                required: true
                type: string
    workflow_dispatch: # manual trigger
        inputs:
            tag_name:
                description: "Release tag to publish (e.g. v0.24.0)"
                required: true
                type: string

permissions:
    contents: read
    packages: write
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                # PRs and main-branch pushes build only 3.13 for speed; releases build all supported versions
                python-version: ${{ (github.event_name == 'pull_request' || github.event_name == 'push') && fromJSON('["3.13"]') || fromJSON('["3.11", "3.12", "3.13"]') }}
        env:
            IMAGE_NAME: hassette
            REGISTRY: ghcr.io
            OWNER: ${{ github.repository_owner }}
            PYTHON_VERSION: ${{ matrix.python-version }}
            IS_STABLE_RELEASE: "false"
            IS_RELEASE: ${{ github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' }}
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.tag_name || github.ref }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                  activate-environment: true
                  enable-cache: true

            - name: Classify release tag
              if: env.IS_RELEASE == 'true'
              env:
                  TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
              run: |
                  PROJECT_VERSION=$(uv version --short)
                  uv run ./tools/check_tag_version.py --ref-name "$TAG_NAME" --project-version "$PROJECT_VERSION"

            - name: Verify VERSION is set for releases
              if: env.IS_RELEASE == 'true'
              run: |
                  if [ -z "$VERSION" ]; then
                      echo "::error::VERSION env var not set after tag classification"
                      exit 1
                  fi

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_NAME }}
                  flavor: |
                      latest=false
                      suffix=-py${{ env.PYTHON_VERSION }}
                  tags: |
                      type=ref,event=pr,enable=${{ github.event_name == 'pull_request' }}
                      type=ref,event=branch,enable=${{ github.event_name == 'push' }}
                      type=raw,value=${{ env.VERSION }},enable=${{ env.IS_RELEASE == 'true' }}
                      type=raw,value=latest,enable=${{ env.IS_RELEASE == 'true' && env.IS_STABLE_RELEASE == 'true' }}

            - name: Build & Push
              # Fork-PR guard: skip only when the PR comes from a fork (forks can't push to GHCR).
              # push/workflow_call/workflow_dispatch always publish.
              if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: linux/amd64,linux/arm64
                  build-args: |
                      PYTHON_VERSION=${{ matrix.python-version }}
