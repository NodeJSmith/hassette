name: Build & Publish Image

on:
    pull_request:
        branches: [main] # publish pr-N tagged image for PR testing
    push:
        branches: [main] # publish main tagged image for bleeding-edge testing
    workflow_call: # called by release-please workflow
        inputs:
            tag_name:
                description: "Release tag (e.g. v0.24.0) — passed by release-please"
                required: true
                type: string
    workflow_dispatch: # manual trigger
        inputs:
            tag_name:
                description: "Release tag to publish (e.g. v0.24.0)"
                required: true
                type: string

permissions:
    contents: read
    packages: write
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 60
        # Concurrency is keyed by event_name so PR, push-to-main, and release runs
        # never share a bucket and therefore never cancel each other. Only mutable-tag
        # paths (pull_request, push) enable cancel-in-progress — releases must run to
        # completion so version/latest tags are never published half-finished.
        concurrency:
            group: ${{ github.workflow }}-${{ github.event_name }}-${{ inputs.tag_name || github.event.pull_request.number || github.ref }}-${{ matrix.python-version }}
            cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
        strategy:
            fail-fast: false
            matrix:
                # PRs and main-branch pushes build only 3.13 for speed; releases build all supported versions
                python-version: ${{ (github.event_name == 'pull_request' || github.event_name == 'push') && fromJSON('["3.13"]') || fromJSON('["3.11", "3.12", "3.13", "3.14"]') }}
        env:
            IMAGE_NAME: hassette
            REGISTRY: ghcr.io
            OWNER: ${{ github.repository_owner }}
            PYTHON_VERSION: ${{ matrix.python-version }}
            IS_RELEASE: ${{ github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  ref: ${{ inputs.tag_name || github.ref }}
                  persist-credentials: false

            - name: Set up QEMU
              uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

            - name: Login to GHCR
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Install uv
              uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
              with:
                  activate-environment: true
                  enable-cache: false

            - name: Classify release tag # writes VERSION and IS_STABLE_RELEASE to GITHUB_ENV
              if: env.IS_RELEASE == 'true'
              env:
                  TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
              run: |
                  PROJECT_VERSION=$(uv version --short)
                  uv run ./tools/release/check_tag_version.py --ref-name "$TAG_NAME" --project-version "$PROJECT_VERSION"

            - name: Verify VERSION and IS_STABLE_RELEASE are set for releases
              if: env.IS_RELEASE == 'true'
              run: |
                  if [ -z "$VERSION" ]; then
                      echo "::error::VERSION env var not set after tag classification"
                      exit 1
                  fi
                  if [ -z "$IS_STABLE_RELEASE" ]; then
                      echo "::error::IS_STABLE_RELEASE env var not set after tag classification"
                      exit 1
                  fi

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
              with:
                  images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_NAME }}
                  flavor: |
                      latest=false
                      suffix=-py${{ env.PYTHON_VERSION }}
                  tags: |
                      type=ref,event=pr,enable=${{ github.event_name == 'pull_request' }}
                      type=ref,event=branch,enable=${{ github.event_name == 'push' }}
                      type=raw,value=${{ env.VERSION }},enable=${{ env.IS_RELEASE == 'true' }}
                      type=raw,value=latest,enable=${{ env.IS_RELEASE == 'true' && env.IS_STABLE_RELEASE == 'true' }}

            - name: Build & Push
              # Fork-PR guard: skip only when the PR comes from a fork (forks can't push to GHCR).
              # push/workflow_call/workflow_dispatch always publish.
              if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{ matrix.python-version }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.python-version }}
                  platforms: linux/amd64,linux/arm64
                  build-args: |
                      PYTHON_VERSION=${{ matrix.python-version }}
