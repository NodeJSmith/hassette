services:
  hassette:
    image: ghcr.io/nodejsmith/hassette:latest-py3.13
    container_name: hassette
    restart: unless-stopped
    stop_grace_period: 45s
    volumes:
      - ./config:/config
      - ./apps:/apps
      - data:/data
      - uv_cache:/uv_cache
    ports:
      - "8126:8126"
    environment:
      - HASSETTE__LOG_LEVEL=info
      - TZ=America/New_York # Set your timezone
    healthcheck:
      # Liveness, not readiness: /api/health/live ignores Home Assistant connectivity, so an HA
      # outage does not mark the container unhealthy. Pointing a restart-triggering healthcheck at
      # /api/health (or /api/health/ready) causes a restart loop whenever HA restarts.
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8126/api/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  uv_cache:
  data:
