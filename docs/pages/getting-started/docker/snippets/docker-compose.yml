services:
  hassette:
    image: ghcr.io/nodejsmith/hassette:latest-py3.13
    container_name: hassette
    restart: unless-stopped
    stop_grace_period: 45s
    volumes:
      - ./config:/config
      - ./apps:/apps
      - data:/data
      - uv_cache:/uv_cache
    ports:
      - "8126:8126"
    environment:
      - LOG_LEVEL=info
      - TZ=America/New_York # Set your timezone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8126/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  uv_cache:
  data:
