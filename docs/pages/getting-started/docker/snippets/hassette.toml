[hassette]
base_url = "http://homeassistant:8123"  # or your HA URL

[hassette.apps]
directory = "/apps"  # absolute path inside container

[hassette.apps.my_app]
filename = "my_app.py"
class_name = "MyApp"
enabled = true

[[hassette.apps.my_app.config]]
# Your app-specific configuration
instance_name = "my_app"
