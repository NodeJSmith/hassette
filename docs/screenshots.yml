# ===========================================================================
# Cancelled execution status (restart/replace overlap modes)
# The bus_overlap and scheduler_overlap example apps self-drive restart-mode
# handlers/jobs, so their restart entry accumulates cancelled executions.
# Longer waits give the self-driving bursts time to accumulate cancellations
# before capture.
# ===========================================================================

# App handlers strip: cancelled count alongside a 100% success rate
- url: "http://localhost:{port}/apps/bus_overlap/handlers"
  output: docs/_static/web_ui_cancelled_strip.png
  selector: "[data-testid='handlers-health-strip']"
  width: 1400
  height: 900
  wait: 6000

# Bus restart handler detail — blue diamond invocation rows, "cancelled"
# labels, and the Cancelled stat cell
- url: "http://localhost:{port}/apps/bus_overlap/handlers"
  output: docs/_static/web_ui_cancelled_detail.png
  selector: "[data-testid^='listener-detail-']"
  width: 1400
  height: 1300
  wait: 6000
  wait_for: "document.querySelector('[data-testid^=\"listener-detail-\"]')"
  javascript: "const click=()=>{const c=[...document.querySelectorAll('[data-testid=\"handler-row-mode-chip\"]')].find(e=>e.getAttribute('aria-label')==='mode: restart');if(c){c.closest('[data-testid^=\"unified-row-\"]').click();return true}return false};if(!click()){const i=setInterval(()=>{if(click())clearInterval(i)},200)}"

# Global handlers table with the cancelled column populated. Captured last so
# the self-driving apps have accumulated cancellations by this point.
# Crop to the scroll wrapper, not the inner table container: the container
# sizes to the full row set (~35 rows) and overflows into empty space, while
# the scroll wrapper is bounded by its max-height to the visible rows.
- url: "http://localhost:{port}/handlers"
  output: docs/_static/web_ui_handlers_cancelled.png
  selector: ".ht-table-card-scroll"
  width: 1400
  height: 900
  wait: 6000

# ===========================================================================
# Backpressure dropped stat (drop_newest policy)
# The backpressure_demo example app self-drives a slow drop_newest listener
# past the dispatch semaphore, so its listener detail accumulates a non-zero
# backpressure-dropped count and rate. The longer wait gives the self-driving
# bursts time to shed enough events for a representative rate.
# ===========================================================================

# Listener detail — the "Backpressure Dropped" stat cell (count + rate). JS
# opens the app's only listener row (retrying until it exists); wait_for gates
# on the detail panel actually showing the Backpressure Dropped label, since
# that cell only renders once the drop count is non-zero. The first burst fires
# one interval (12s) after startup, so the gate — not a fixed wait — is what
# makes this entry timing-robust against a freshly-started demo. The 6000ms
# wait (matching the cancelled_detail entries) lets the rate settle past the
# first-drop instant to a representative value rather than a momentary 100%.
- url: "http://localhost:{port}/apps/backpressure_demo/handlers"
  output: docs/_static/web_ui_backpressure_dropped.png
  selector: "[data-testid^='listener-detail-']"
  width: 1400
  height: 1300
  wait: 6000
  wait_for: "document.querySelector('[data-testid^=\"listener-detail-\"]')?.textContent.includes('Backpressure Dropped')"
  javascript: "const click=()=>{const r=document.querySelector('[data-testid^=\"unified-row-listener-\"]');if(r){r.click();return true}return false};if(!click()){const i=setInterval(()=>{if(click())clearInterval(i)},200)}"
