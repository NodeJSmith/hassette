[hassette.apps]
directory = "examples"
autodetect = true

[hassette.apps.motion_lights]
filename = "motion_lights.py"
class_name = "MotionLights"

[[hassette.apps.motion_lights.config]]
instance_name = "backyard_kitchen"
motion_entity = "binary_sensor.movement_backyard"
light_entity = "light.kitchen_lights"
boost_brightness = 255

[[hassette.apps.motion_lights.config]]
instance_name = "backyard_ceiling"
motion_entity = "binary_sensor.movement_backyard"
light_entity = "light.ceiling_lights"
boost_brightness = 200
default_brightness = 80

[hassette.apps.climate_controller]
filename = "climate_controller.py"
class_name = "ClimateController"
config = { instance_name = "climate_controller", temp_threshold = 24.0, ac_switch = "switch.ac", check_interval = 45.0 }

[hassette.apps.cover_scheduler]
filename = "cover_scheduler.py"
class_name = "CoverScheduler"
config = { instance_name = "cover_scheduler" }

[hassette.apps.presence_tracker]
filename = "presence_tracker.py"
class_name = "PresenceTracker"

[[hassette.apps.presence_tracker.config]]
instance_name = "paulus"
tracker_entity = "device_tracker.demo_paulus"
person_name = "Paulus"
status_interval = 30.0

[[hassette.apps.presence_tracker.config]]
instance_name = "home_boy"
tracker_entity = "device_tracker.demo_home_boy"
person_name = "HomeBoy"
status_interval = 30.0

[hassette.apps.demo_stimulator]
filename = "demo_stimulator.py"
class_name = "DemoStimulator"
config = { instance_name = "demo_stimulator", enable_failure = true }

[hassette.apps.scheduler_overlap]
filename = "scheduler_overlap.py"
class_name = "SchedulerOverlapDemo"
config = { instance_name = "scheduler_overlap" }

[hassette.apps.bus_overlap]
filename = "bus_overlap.py"
class_name = "BusOverlapDemo"
config = { instance_name = "bus_overlap" }

[hassette.database]
retention_days = 14
max_size_mb = 100

[hassette.logging]
scheduler_service = "WARNING"
websocket = "WARNING"
