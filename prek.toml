# Configuration file for prek, a fast Rust-based Git hook manager.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

# ---------------------------------------------------------------------------
# Builtin hooks — Rust-native reimplementations, no venv or network fetch
# ---------------------------------------------------------------------------
[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "mixed-line-ending" },
    { id = "check-case-conflict" },
    { id = "check-shebang-scripts-are-executable" },
]

# Hooks not yet reimplemented as builtins
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    { id = "check-builtin-literals" },
    { id = "debug-statements" },
]

# ---------------------------------------------------------------------------
# External repos
# ---------------------------------------------------------------------------
[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.14.9"
hooks = [
    { id = "ruff-check", args = ["--fix"], exclude = '^docs/.*\.(py|rst)$' },
    { id = "ruff-format", exclude = '^docs/.*\.(py|rst)$' },
]

[[repos]]
repo = "https://github.com/python-trio/flake8-async"
rev = "26.4.2"
hooks = [
    { id = "flake8-async", args = ["--enable=ASYNC103,ASYNC104"] },
]

[[repos]]
repo = "https://github.com/crate-ci/typos"
rev = "v1.46.3"
hooks = [
    { id = "typos", args = ["--force-exclude"], stages = ["pre-commit", "pre-push"] },
]

[[repos]]
repo = "https://github.com/RobertCraigie/pyright-python"
rev = "v1.1.408"
hooks = [
    { id = "pyright", stages = ["pre-push"], exclude = '^(docs|scripts)/.*\.(py|rst)$' },
]

# ---------------------------------------------------------------------------
# Local hooks — security
# ---------------------------------------------------------------------------
[[repos]]
repo = "local"

[[repos.hooks]]
id = "zizmor"
name = "zizmor (GitHub Actions security)"
language = "system"
entry = "env -u GH_TOKEN -u GITHUB_TOKEN uvx zizmor@1.26.1 --offline"
files = '^\.github/workflows/'
stages = ["pre-commit", "pre-push"]

# ---------------------------------------------------------------------------
# Local hooks — frontend (grouped, excluded from python CI via --no-group)
# ---------------------------------------------------------------------------
[[repos]]
repo = "local"

[[repos.hooks]]
id = "prettier"
name = "prettier (frontend)"
language = "system"
entry = "npx --prefix frontend prettier --write"
types_or = ["ts", "tsx", "css"]
files = "^frontend/src/"
exclude = '(generated-types\.ts|\.module\.css\.d\.ts)$'
groups = ["frontend"]

[[repos.hooks]]
id = "eslint"
name = "eslint (frontend)"
language = "system"
entry = "npx --prefix frontend eslint"
types_or = ["ts", "tsx"]
files = "^frontend/src/"
groups = ["frontend"]

[[repos.hooks]]
id = "stylelint"
name = "stylelint (frontend)"
language = "system"
entry = "npx --prefix frontend stylelint"
types = ["css"]
files = "^frontend/src/"
groups = ["frontend"]

[[repos.hooks]]
id = "tsc"
name = "tsc (frontend)"
language = "system"
entry = "bash -c 'cd frontend && npx tsc --noEmit'"
types_or = ["ts", "tsx"]
files = "^frontend/src/"
pass_filenames = false
groups = ["frontend"]

[[repos.hooks]]
id = "check-breakpoint-drift"
name = "Check JS/CSS breakpoint constants match"
language = "system"
entry = "./tools/frontend/check_breakpoint_drift.py"
pass_filenames = false
types_or = ["ts", "tsx", "css"]
files = "^frontend/src/"
stages = ["pre-commit", "pre-push"]
groups = ["frontend"]

[[repos.hooks]]
id = "check-internal-anchor-links"
name = "Check native <a> tags for internal routes"
language = "system"
entry = "./tools/frontend/check_internal_anchor_links.py"
pass_filenames = false
types_or = ["ts", "tsx"]
files = "^frontend/src/"
stages = ["pre-commit", "pre-push"]
groups = ["frontend"]

[[repos.hooks]]
id = "check-css-module-globals"
name = "Check CSS module :global() escaping"
language = "system"
entry = "./tools/frontend/check_css_module_globals.py"
pass_filenames = false
files = '^frontend/src/.*\.module\.css$'
stages = ["pre-commit", "pre-push"]
groups = ["frontend"]

[[repos.hooks]]
id = "check-dead-global-css"
name = "Check for unused global CSS selectors"
language = "system"
entry = "./tools/frontend/check_dead_global_css.py"
pass_filenames = false
types_or = ["ts", "tsx", "css"]
files = "^frontend/src/"
stages = ["pre-commit", "pre-push"]
groups = ["frontend"]

[[repos.hooks]]
id = "check-dead-tokens"
name = "Check for unused CSS tokens"
language = "system"
entry = "./tools/frontend/check_dead_tokens.py"
pass_filenames = false
types_or = ["ts", "tsx", "css"]
files = "^frontend/src/"
stages = ["pre-commit", "pre-push"]
groups = ["frontend"]

[[repos.hooks]]
id = "check-global-css-allowlist"
name = "Check global CSS allowlist"
language = "system"
entry = "./tools/frontend/check_global_css_allowlist.py"
pass_filenames = false
files = '^frontend/src/(global|styles/).*\.css$'
stages = ["pre-commit", "pre-push"]
groups = ["frontend"]

[[repos.hooks]]
id = "check-undefined-css-refs"
name = "Check for undefined ht-* class refs in TSX"
language = "system"
entry = "./tools/frontend/check_undefined_css_refs.py"
pass_filenames = false
types_or = ["ts", "tsx", "css"]
files = "^frontend/src/"
stages = ["pre-commit", "pre-push"]
groups = ["frontend"]

# ---------------------------------------------------------------------------
# Local hooks — codegen (pre-push only)
# ---------------------------------------------------------------------------
[[repos]]
repo = "local"

[[repos.hooks]]
id = "generate_sync_facade"
name = "Generate sync.py facade"
language = "system"
entry = "uv run python codegen/src/hassette_codegen/sync_facade/ --target api"
pass_filenames = false
files = '(src/hassette/api/api\.py|codegen/src/hassette_codegen/sync_facade/)'
stages = ["pre-push"]

[[repos.hooks]]
id = "generate_recording_sync_facade"
name = "Generate RecordingSyncFacade"
language = "system"
entry = "uv run python codegen/src/hassette_codegen/sync_facade/ --target recording"
pass_filenames = false
files = '(src/hassette/test_utils/recording_api\.py|src/hassette/api/(api|helpers)\.py|codegen/src/hassette_codegen/sync_facade/)'
stages = ["pre-push"]

[[repos.hooks]]
id = "generate_bus_sync_facade"
name = "Generate BusSyncFacade"
language = "system"
entry = "uv run python codegen/src/hassette_codegen/sync_facade/ --target bus"
pass_filenames = false
files = '(src/hassette/bus/bus\.py|src/hassette/bus/options\.py|codegen/src/hassette_codegen/sync_facade/)'
stages = ["pre-push"]

[[repos.hooks]]
id = "generate_scheduler_sync_facade"
name = "Generate SchedulerSyncFacade"
language = "system"
entry = "uv run python codegen/src/hassette_codegen/sync_facade/ --target scheduler"
pass_filenames = false
files = '(src/hassette/scheduler/scheduler\.py|codegen/src/hassette_codegen/sync_facade/)'
stages = ["pre-push"]

# ---------------------------------------------------------------------------
# Local hooks — pygrep patterns, validation, python linters
# ---------------------------------------------------------------------------
[[repos]]
repo = "local"

[[repos.hooks]]
id = "no-mypy-ignore"
name = 'Ban "type: ignore" comments (use pyright)'
language = "pygrep"
types = ["python"]
entry = "# type: ignore"

[[repos.hooks]]
id = "no-future-annotations"
name = "Ban from __future__ import annotations (breaks Pydantic)"
language = "pygrep"
types = ["python"]
entry = "^from __future__ import annotations"

[[repos.hooks]]
id = "check-codecov-yml"
name = "Check codecov.yml validity"
language = "system"
entry = "curl --connect-timeout 10 --max-time 60 --fail --data-binary @./.github/codecov.yml https://codecov.io/validate"
types = ["yaml"]
files = '^\.github/codecov\.yml$'
pass_filenames = false

[[repos.hooks]]
id = "check-schemas-fresh"
name = "Check schemas are up to date"
language = "system"
entry = "tools/check_schemas_fresh.py"
pass_filenames = false
files = "^src/hassette/(web/|config/)"
stages = ["pre-push"]

[[repos.hooks]]
id = "check-missing-attribute"
name = "Check for missing 'attributes' in State classes"
language = "system"
entry = "./tools/check_for_missing_attribute.py"
pass_filenames = false
stages = ["pre-commit", "pre-push"]

[[repos.hooks]]
id = "check-registration-signatures"
name = "Check registration method signatures"
language = "system"
entry = "./tools/check_registration_signatures.py"
files = '^src/hassette/(bus/bus|scheduler/scheduler)\.py$'
pass_filenames = false
stages = ["pre-commit", "pre-push"]

[[repos.hooks]]
id = "check-lazy-imports"
name = "Ban lazy imports (use '# lazy-import:' to defend circular-import cases)"
language = "system"
entry = "./tools/check_lazy_imports.py"
files = '^(src|tests|scripts|tools|codegen|docs|examples)/.*\.py$'
stages = ["pre-commit", "pre-push"]

[[repos.hooks]]
id = "check-exception-names"
name = "Enforce 'exc' naming in except handlers"
language = "system"
entry = "./tools/check_exception_names.py"
files = '^(src|tests|scripts|tools|codegen|docs|examples)/.*\.py$'
stages = ["pre-commit", "pre-push"]

[[repos.hooks]]
id = "check-type-checking-position"
name = "Ensure TYPE_CHECKING blocks sit after all regular imports"
language = "system"
entry = "./tools/check_type_checking_position.py"
files = '^(src|tests|scripts|tools|codegen|docs|examples)/.*\.py$'
stages = ["pre-commit", "pre-push"]

[[repos.hooks]]
id = "check-constants-position"
name = "Flag UPPER_CASE constants defined after first class/function"
language = "system"
entry = "./tools/check_constants_position.py"
files = '^(src|tests|scripts|tools|codegen|docs|examples)/.*\.py$'
stages = ["pre-commit", "pre-push"]

[[repos.hooks]]
id = "check-spec-tokens"
name = "Ban leaked spec-artifact tokens (AC#/FR#/T##/WP#)"
language = "system"
entry = "./tools/check_spec_tokens.py"
files = '^(src|tests|scripts|tools|codegen|docs|examples)/.*\.py$'
stages = ["pre-commit", "pre-push"]

[[repos.hooks]]
id = "check-llm-cruft"
name = "Ban AI-writing tells (section dividers, filler phrases)"
language = "system"
entry = "./tools/check_llm_cruft.py"
files = '^(src|tests|scripts|tools|codegen|docs|examples)/.*\.py$'
stages = ["pre-commit", "pre-push"]

[[repos.hooks]]
id = "check-module-boundaries"
name = "Enforce import boundaries (test_utils isolation) in src"
language = "system"
entry = "./tools/check_module_boundaries.py"
files = '^src/.*\.py$'
stages = ["pre-commit", "pre-push"]

[[repos.hooks]]
id = "check-test-factories"
name = "Check test factory shadowing"
language = "system"
entry = "./tools/check_test_factories.py"
files = '^tests/.*\.py$'
stages = ["pre-commit", "pre-push"]

[[repos.hooks]]
id = "check-coordinator-internal"
name = "Check un-annotated coordinator-internal accesses in tests"
language = "system"
entry = "./tools/check_coordinator_internal.py"
pass_filenames = false
files = '^tests/.*\.py$'
stages = ["pre-commit", "pre-push"]
