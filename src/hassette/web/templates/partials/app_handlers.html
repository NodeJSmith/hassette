{% from "macros/ui.html" import handler_row %}
{% if listeners %}
  <div class="ht-item-list">
    {% for listener in listeners %}
      {{ handler_row(listener, app_key, summary=handler_summaries.get(listener.listener_id, "")) }}
    {% endfor %}
  </div>
{% else %}
  <p class="ht-text-muted ht-text-xs">No event handlers registered.</p>
{% endif %}
