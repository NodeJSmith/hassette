{% if recent_errors %}
  <div class="ht-error-feed">
    {% for err in recent_errors %}
      <div class="ht-error-feed__item" data-testid="error-item">
        <div class="ht-error-feed__header">
          <span class="ht-badge ht-badge--sm ht-badge--danger">{{ err.error_type }}</span>
          <a href="/ui/apps/{{ err.app_key }}" class="ht-text-xs">{{ err.app_key }}</a>
          <code class="ht-text-xs ht-text-muted">{{ err.handler_method }}</code>
          {% if err.execution_start_ts %}
            <time class="ht-text-xs ht-text-muted"
                  x-data
                  x-text="new Date({{ err.execution_start_ts }} * 1000).toLocaleTimeString()"></time>
          {% endif %}
        </div>
        <div class="ht-error-feed__message ht-text-xs">{{ err.error_message }}</div>
      </div>
    {% endfor %}
  </div>
{% else %}
  <p class="ht-text-muted ht-text-xs">No recent errors. All systems healthy.</p>
{% endif %}
