<div class="ht-status-bar" x-data>
  <span class="ht-ws-indicator"
        :class="$store.ws.connected ? 'is-connected' : 'is-disconnected'">
    <span class="ht-pulse-dot"
          :class="$store.ws.connected ? '' : 'disconnected'"></span>
    <span class="ht-text-xs"
          x-text="$store.ws.connected ? 'Connected' : 'Disconnected'"></span>
  </span>
  <button class="ht-theme-toggle"
          data-testid="theme-toggle"
          aria-label="Toggle theme"
          @click="let t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; document.documentElement.setAttribute('data-theme', t); localStorage.setItem('ht-theme', t)">
    <svg data-theme-icon="sun" style="display:none" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg data-theme-icon="moon" style="display:none" viewBox="0 0 24 24">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>
</div>
