<div class="ht-connection-bar" data-testid="connection-bar" x-data
     :class="$store.ws.connected ? 'ht-connection-bar--connected' : 'ht-connection-bar--disconnected'">
  <span class="ht-pulse-dot"
        :class="$store.ws.connected ? '' : 'disconnected'"></span>
  <span class="ht-text-sm"
        x-text="$store.ws.connected ? 'Connected' : 'Disconnected'"></span>
  {% if system_status and system_status.websocket_connected %}
    <span class="ht-text-xs ht-text-muted">WebSocket active</span>
  {% endif %}
</div>
