<div class="ht-alert-banner" x-data>
  <div class="ht-alert ht-alert--warning"
       x-show="$store.ws._ready && !$store.ws.connected"
       x-transition
       x-cloak>
    <span class="ht-icon">
      <!-- Lucide: triangle-alert -->
      <svg viewBox="0 0 24 24" style="width:1em;height:1em;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round">
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"></path>
        <path d="M12 9v4"></path>
        <path d="M12 17h.01"></path>
      </svg>
    </span>
    <span>Home Assistant disconnected</span>
  </div>
  <div id="alert-failed-apps"
       data-live-on-app="/ui/partials/alert-failed-apps">{% include "partials/alert_failed_apps.html" %}</div>
</div>
