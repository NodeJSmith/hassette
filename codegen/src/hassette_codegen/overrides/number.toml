# number.set_value exposes a `text` selector, but Home Assistant coerces the field
# to a float (vol.Coerce(float)) in the service schema. Type it numerically.
[param_type_overrides]
value = "float"

[[property_overrides]]
name = "step"
type = "float | None"
add = true

[[property_overrides]]
name = "min_value"
type = "float | None"
add = true

[[property_overrides]]
name = "max_value"
type = "float | None"
add = true

[[property_overrides]]
name = "unit_of_measurement"
type = "str | None"
add = true
