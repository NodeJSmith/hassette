# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Same as Black.
line-length = 120
indent-width = 4

target-version = "py311"

[lint]
external = ["ASYNC103", "ASYNC104"]
select = [
    # "ANN",
    "ASYNC",  # flake8-async
    "E",      # pycodestyle (error)
    "W",      # pycodestyle (warning)
    "F",      # pyflakes
    "UP",     # pyupgrade
    "C419",   # pylint - convention - unnecessary-comprehension-in-call
    "RET",    # flake8-return
    "SIM",    # flake8-simplify
    "ARG",    # flake8-unused-arguments
    "PTH",    # flake8-use-pathlib
    "PD",     # pandas-vet
    "RUF",    # ruff
    "TCH",    # flake8-type-checking
    "S",      # flake8-bandit (security)
    "I",      # isort
    "DTZ",    # flake8-datetimez
    "PT",     # flake8-pytest-style (PT)
    "B",      # bugbear
    "LOG",    # flake8-logging (LOG)
    "G",      #flake8-logging-format (G)
    "N",      #pep8-naming (N),
    "PERF",   # Perflint (PERF)
    "TID252", # relative imports
]

ignore = [
    "RET504", # flake8-return - unnecessary-assign
    "SIM102", # flake8-simplify - collapsible-if
    "PTH123", # flake8-use-pathlib - builtin-open
    "RUF015", # ruff - unnecessary-iterable-allocation-for-first-element
    "PTH118", # flake8-use-pathlib - os-path-join
    "DTZ001", # call-datetime-without-tzinfo (DTZ001)
    "DTZ002", # call-datetime-today (DTZ002)
    "DTZ005", # call-datetime-now-without-tzinfo (DTZ005)
    "DTZ007", # call-datetime-strptime-without-zone (DTZ007)
    "D100",   # undocumented-public-module
    "D101",   # undocumented-public-class
    "D104",   # undocumented-public-package
    # "D103", # undocumented-public-function
    "D107",   # undocumented-public-init
    "ANN204", # missing-return-type-special-method
    "ANN003", # missing-type-kwargs
    "ANN002", # missing-type-args (ANN002)
    "ARG002", # unused-method-argument (ARG002)
    "UP046",  # non-pep695-generic-class (UP046)
    "UP047",  # non-pep695-generic-function (UP047)
    "N801",   # invalid-class-name
    "SIM103", # needless-bool
    "N812",   # lowercase-imported-as-non-lowercase
    "ASYNC109", # timeout-parameter — framework API deliberately passes timeout through
]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",   # assert usage
    "S104",   # binding to all interfaces (test fixtures)
    "S105",   # hardcoded passwords (test tokens)
    "S106",   # hardcoded password arguments
    "S108",   # insecure temp file paths
    "S110",   # try-except-pass
    "S603",   # subprocess calls
    "S607",   # partial executable paths
    "S608",   # SQL string construction (test queries)
    "S610",   # false positive: not Django .extra()
    "S102",   # exec usage (API surface test)
    "ASYNC221", # blocking subprocess in async test functions (docker management)
]
"tests/integration/telemetry/test_telemetry_query_service_misc.py" = ["ASYNC251"]
"tools/*.py" = ["S603", "S607"]
"scripts/*.py" = ["S105", "S310", "S603", "S607"]
"codegen/**/*.py" = ["S108", "S603", "S607", "S701"]
"docs/**/*.py" = ["S101", "S105", "S106", "S311", "ASYNC110"]
"src/hassette/core/telemetry_query_service.py" = ["S608"]
"src/hassette/core/telemetry_repository.py" = ["S608"]
"src/hassette/core/session_manager.py" = ["S608"]
"src/hassette/test_utils/*.py" = ["S101", "S104", "S105", "S311"]
"src/hassette/cli/client.py" = ["S104"]
"src/hassette/config/models.py" = ["S104"]
"src/hassette/api/api.py" = ["S101"]
"src/hassette/bus/*.py" = ["S101"]
"src/hassette/core/api_resource.py" = ["S101"]
"src/hassette/core/bus_service.py" = ["S101"]
"src/hassette/core/websocket_service.py" = ["S101", "S311"]
"src/hassette/core/scheduler_service.py" = ["S311"]
"src/hassette/event_handling/*.py" = ["S101"]
"src/hassette/scheduler/scheduler.py" = ["S101"]
"src/hassette/state_manager/state_manager.py" = ["S101"]
"src/hassette/utils/app_utils.py" = ["S101"]
"src/hassette/models/states/text.py" = ["S105"]

[format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

[lint.pydocstyle]
convention = "google" # Accepts: "google", "numpy", or "pep257".
